canisters:
  - name: mock_analytics
    recipe:
      type: "@dfinity/motoko@v4.1.0"
      configuration:
        main: canisters/mock_analytics/src/main.mo
        candid: canisters/mock_analytics/mock_analytics.did

  - name: mock_backend
    recipe:
      type: "@dfinity/motoko@v4.1.0"
      configuration:
        main: canisters/mock_backend/src/main.mo
        candid: canisters/mock_backend/mock_backend.did

  - name: explorer_bff
    recipe:
      type: "@dfinity/motoko@v4.1.0"
      configuration:
        main: canisters/explorer_bff/src/main.mo
        candid: canisters/explorer_bff/explorer_bff.did

  - name: explorer_assets
    recipe:
      type: "@dfinity/asset-canister@v2.1.0"
      configuration:
        dir: frontend/dist
        build:
          - npm install
          - npm run build --workspace=frontend
